name: Release Braidcast
run-name: ${{ github.ref_name }} Braidcast release 🚀
# Fork-owned Windows-x64 release. Runs on a `v`-prefixed tag (e.g. v0.1.0),
# builds via the shared build-project workflow, and cuts a DRAFT GitHub
# release with the Windows-x64 zip and NSIS installer. `push.yaml`
# deliberately excludes `v*` tags so the build is not run twice.
#
# Signing: the sign-windows job submits the packaged zip/installer to
# SignPath (see docs/signing.md) and the release is attached with the
# signed payload. Until SIGNPATH_API_TOKEN is configured, sign-windows
# no-ops and the release ships unsigned (today's behavior) rather than
# failing the tag push.
on:
  push:
    tags:
      - 'v*'
permissions:
  contents: write
jobs:
  build-project:
    name: Build 🧱
    uses: ./.github/workflows/build-project.yaml
    secrets: inherit
    permissions:
      contents: read

  sign-windows:
    name: Sign Windows Build ✍️
    runs-on: ubuntu-24.04
    needs: [build-project]
    defaults:
      run:
        shell: bash
    steps:
      - name: Check SignPath Configuration 🔑
        id: check
        run: |
          : Check SignPath Configuration 🔑
          if [[ "${RUNNER_DEBUG}" ]]; then set -x; fi

          if [[ -n "${SIGNPATH_API_TOKEN}" ]]; then
            echo 'configured=true' >> "$GITHUB_OUTPUT"
          else
            echo '::notice::SIGNPATH_API_TOKEN is not set; this release will ship unsigned. See docs/signing.md.'
            echo 'configured=false' >> "$GITHUB_OUTPUT"
          fi
        env:
          SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}

      - name: Download Windows Build 📥
        if: fromJSON(steps.check.outputs.configured)
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: obs-studio-windows-x64-*
          path: unsigned

      - name: Stage Unsigned Payload 📦
        if: fromJSON(steps.check.outputs.configured)
        run: |
          : Stage Unsigned Payload 📦
          if [[ "${RUNNER_DEBUG}" ]]; then set -x; fi

          # windows-build (build-project.yaml) uploads the CPack zip and NSIS
          # installer together under one artifact. Re-stage just those two
          # files so the SignPath artifact configuration signs exactly the
          # payload it needs to (braidcast.exe, bundled plugin/hook DLLs
          # inside the zip, and the installer exe itself) and nothing else.
          mkdir -p unsigned-payload
          find unsigned -type f \( -name 'braidcast-*-windows-x64.zip' -o -name 'braidcast-*-windows-x64.exe' \) \
            -exec cp -v {} unsigned-payload/ \;

          if [[ -z "$(ls -A unsigned-payload 2>/dev/null)" ]]; then
            echo '::error::No braidcast-*-windows-x64.{zip,exe} found to sign'
            exit 1
          fi

      - name: Upload Unsigned Payload 📡
        if: fromJSON(steps.check.outputs.configured)
        id: upload
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: braidcast-windows-x64-unsigned
          path: unsigned-payload/*

      - name: Submit Signing Request ✍️
        if: fromJSON(steps.check.outputs.configured)
        uses: signpath/github-action-submit-signing-request@b9d91eadd323de506c0c81cf0c7fe7438f3360fd # v2.2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ secrets.SIGNPATH_ORGANIZATION_ID || vars.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ vars.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ vars.SIGNPATH_SIGNING_POLICY_SLUG }}
          artifact-configuration-slug: ${{ vars.SIGNPATH_ARTIFACT_CONFIG_SLUG }}
          github-artifact-id: ${{ steps.upload.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: signed-payload

      - name: Upload Signed Payload 📡
        if: fromJSON(steps.check.outputs.configured)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: braidcast-windows-x64-signed
          path: signed-payload/*

  create-release:
    name: Create Braidcast Release 🛫
    runs-on: ubuntu-24.04
    needs: [build-project, sign-windows]
    defaults:
      run:
        shell: bash
    steps:
      # Must precede the artifact download: checkout cleans the workspace.
      # Full history and tags, both of which the release notes are rendered from.
      - name: Check Out Repository 🔬
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Resolve Version 🏷️
        id: version
        run: |
          : Resolve Version 🏷️
          if [[ "${RUNNER_DEBUG}" ]]; then set -x; fi
          version="${GITHUB_REF_NAME#v}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Set Up Bun 🥟
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Generate Release Notes 📝
        id: notes
        run: |
          : Generate Release Notes 📝
          if [[ "${RUNNER_DEBUG}" ]]; then set -x; fi

          # Groups the commits since the previous v* tag by subsystem, per the
          # module prefixes CONTRIBUTING.md mandates. Written outside the
          # workspace so it can never be picked up as a release asset.
          notes="${RUNNER_TEMP}/release-notes.md"
          cd .github/scripts/changelog
          bun install --frozen-lockfile
          bun run generate.ts --to "${GITHUB_REF_NAME}" > "${notes}"

          echo "path=${notes}" >> "$GITHUB_OUTPUT"
          cat "${notes}"

      - name: Download Build Artifacts 📥
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts

      - name: Stage Release Files 📦
        id: stage
        run: |
          : Stage Release Files 📦
          if [[ "${RUNNER_DEBUG}" ]]; then set -x; fi

          # The Windows package (Package-Windows.ps1 -> CPack) emits both a
          # portable zip and an NSIS system installer inside the uploaded
          # artifact: braidcast-<version>-windows-x64.{zip,exe}, regardless of
          # the internal artifact name. Match each by glob so the release is
          # agnostic to the git-describe version embedded by CPack. Prefer the
          # SignPath-signed payload (sign-windows job) when it exists; fall
          # back to the raw build output when SIGNPATH_API_TOKEN isn't
          # configured yet (see docs/signing.md), so releases still ship.
          version="${{ steps.version.outputs.version }}"

          signed_dir="artifacts/braidcast-windows-x64-signed"
          if [[ -d "${signed_dir}" ]]; then
            search_dir="${signed_dir}"
            echo '::notice::Attaching SignPath-signed Windows artifacts'
          else
            search_dir="artifacts"
            echo '::warning::SIGNPATH_API_TOKEN not configured; attaching UNSIGNED Windows artifacts (see docs/signing.md)'
          fi

          zip="$(find "${search_dir}" -type f -name 'braidcast-*-windows-x64.zip' | head -1)"
          if [[ -z "${zip}" ]]; then
            echo "::error::No braidcast-*-windows-x64.zip found in ${search_dir}"
            find artifacts -type f
            exit 1
          fi
          zip_out="Braidcast-${version}-Windows-x64.zip"
          mv -v "${zip}" "${zip_out}"

          installer="$(find "${search_dir}" -type f -name 'braidcast-*-windows-x64.exe' | head -1)"
          if [[ -z "${installer}" ]]; then
            echo "::error::No braidcast-*-windows-x64.exe (NSIS installer) found in ${search_dir}"
            find artifacts -type f
            exit 1
          fi
          installer_out="Braidcast-${version}-Windows-x64-Installer.exe"
          mv -v "${installer}" "${installer_out}"

          echo "asset=${zip_out}" >> "$GITHUB_OUTPUT"
          echo "installer=${installer_out}" >> "$GITHUB_OUTPUT"

      - name: Create Draft Release 🛫
        uses: softprops/action-gh-release@c062e08bd532815e2082a85e87e3ef29c3e6d191 # v2.4.1
        with:
          draft: true
          tag_name: ${{ github.ref_name }}
          name: Braidcast ${{ steps.version.outputs.version }}
          body_path: ${{ steps.notes.outputs.path }}
          files: |
            ${{ steps.stage.outputs.asset }}
            ${{ steps.stage.outputs.installer }}
