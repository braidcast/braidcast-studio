name: Release Braidcast
run-name: ${{ github.ref_name }} Braidcast release 🚀
# Fork-owned Windows-x64 release. Runs on a `v`-prefixed tag (e.g. v0.1.0),
# builds via the shared build-project workflow, and cuts a DRAFT GitHub
# release with the unsigned Windows-x64 zip. No secrets, no signing, no
# notarization. `push.yaml` deliberately excludes `v*` tags so the build is
# not run twice; upstream-style bare tags (e.g. 0.1.0) still flow through
# push.yaml's obsproject release path.
on:
  push:
    tags:
      - 'v*'
permissions:
  contents: write
jobs:
  build-project:
    name: Build 🧱
    uses: ./.github/workflows/build-project.yaml
    secrets: inherit
    permissions:
      contents: read

  create-release:
    name: Create Braidcast Release 🛫
    runs-on: ubuntu-24.04
    needs: [build-project]
    defaults:
      run:
        shell: bash
    steps:
      - name: Resolve Version 🏷️
        id: version
        run: |
          : Resolve Version 🏷️
          if [[ "${RUNNER_DEBUG}" ]]; then set -x; fi
          version="${GITHUB_REF_NAME#v}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Download Build Artifacts 📥
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts

      - name: Stage Release Files 📦
        id: stage
        run: |
          : Stage Release Files 📦
          if [[ "${RUNNER_DEBUG}" ]]; then set -x; fi

          # The Windows package (Package-Windows.ps1 -> CPack) emits both a
          # portable zip and an NSIS system installer inside the uploaded
          # artifact: braidcast-<version>-windows-x64.{zip,exe}, regardless of
          # the internal artifact name. Match each by glob so the release is
          # agnostic to the git-describe version embedded by CPack.
          version="${{ steps.version.outputs.version }}"

          zip="$(find artifacts -type f -name 'braidcast-*-windows-x64.zip' | head -1)"
          if [[ -z "${zip}" ]]; then
            echo "::error::No braidcast-*-windows-x64.zip found in artifacts"
            find artifacts -type f
            exit 1
          fi
          zip_out="Braidcast-${version}-Windows-x64.zip"
          mv -v "${zip}" "${zip_out}"

          installer="$(find artifacts -type f -name 'braidcast-*-windows-x64.exe' | head -1)"
          if [[ -z "${installer}" ]]; then
            echo "::error::No braidcast-*-windows-x64.exe (NSIS installer) found in artifacts"
            find artifacts -type f
            exit 1
          fi
          installer_out="Braidcast-${version}-Windows-x64-Installer.exe"
          mv -v "${installer}" "${installer_out}"

          echo "asset=${zip_out}" >> "$GITHUB_OUTPUT"
          echo "installer=${installer_out}" >> "$GITHUB_OUTPUT"

      - name: Create Draft Release 🛫
        uses: softprops/action-gh-release@c062e08bd532815e2082a85e87e3ef29c3e6d191 # v2.4.1
        with:
          draft: true
          tag_name: ${{ github.ref_name }}
          name: Braidcast ${{ steps.version.outputs.version }}
          files: |
            ${{ steps.stage.outputs.asset }}
            ${{ steps.stage.outputs.installer }}
