<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OBS MultiStreamer</title>
  <style>
    :root { color-scheme: dark; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: system-ui, "Segoe UI", sans-serif;
      background: #16181d;
      color: #e6e8ec;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      text-align: center;
      padding: 40px 56px;
      border: 1px solid #2a2e37;
      border-radius: 12px;
      background: #1c1f26;
    }
    h1 { font-size: 22px; font-weight: 600; margin: 0 0 4px; }
    .status { color: #4ade80; font-size: 13px; letter-spacing: 0.04em; text-transform: uppercase; }
    .ver { margin-top: 18px; font-size: 13px; color: #9aa0aa; }
    .ver code { color: #d7dae0; }
  </style>
</head>
<body>
  <div class="card">
    <h1>OBS MultiStreamer</h1>
    <div class="status">shell online</div>
    <div class="ver">libobs <code id="ver">querying…</code></div>
  </div>
  <script>
    // Prove the JS<->C++ bridge survived the port: ask libobs for its version.
    function queryVersion() {
      if (!window.cefQuery) {
        document.getElementById('ver').textContent = '(bridge unavailable)';
        console.log('OBSERR: cefQuery missing');
        return;
      }
      window.cefQuery({
        request: 'getObsVersion',
        onSuccess: function (r) {
          document.getElementById('ver').textContent = r;
          console.log('OBSVER:' + r);
        },
        onFailure: function (code, msg) {
          document.getElementById('ver').textContent = 'error ' + code;
          console.log('OBSERR:' + code + ' ' + msg);
        }
      });
    }
    window.addEventListener('load', queryVersion);
  </script>
</body>
</html>
